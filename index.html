<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vista a Esther</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <audio id="audio-bg" src="sons/musica.mp3" loop></audio>
  <div id="flash"></div>
  <div id="notif"></div>

  <div id="tela-capa">
    <span class="estrela" style="top:8%;left:8%;animation-duration:3s">✦</span>
    <span class="estrela" style="top:12%;right:12%;animation-duration:5s;font-size:16px">✧</span>
    <span class="estrela" style="bottom:6%;left:15%;animation-duration:4s;font-size:14px">✦</span>
    <span class="estrela" style="bottom:10%;right:8%;animation-duration:6s">✧</span>
    <span class="estrela" style="top:40%;left:4%;animation-duration:3.5s;font-size:12px">✦</span>
    <span class="estrela" style="top:20%;left:35%;animation-duration:4.5s;font-size:13px">✧</span>
    <span class="estrela" style="top:60%;right:30%;animation-duration:5.5s;font-size:15px">✦</span>
    <span class="estrela" style="bottom:5%;left:15%;animation-duration:3.8s;font-size:11px">✧</span>
    <span class="estrela" style="top:75%;left:8%;animation-duration:4.2s;font-size:16px">✦</span>
    <span class="estrela" style="top:5%;right:35%;animation-duration:5s;font-size:12px">✧</span>
    <span class="estrela" style="bottom:55%;right:5%;animation-duration:3.5s;font-size:14px">✦</span>
    <span class="estrela" style="bottom:6%;left:38%;animation-duration:4s;font-size:13px">✧</span>
    <span class="estrela" style="bottom:20%;left:62%;animation-duration:4.8s;font-size:12px">✦</span>
    <span class="estrela" style="bottom:3%;left:50%;animation-duration:3.6s;font-size:15px">✧</span>
    <div class="capa-conteudo">
      <button id="btn-jogar" onclick="irParaJogo()">Jogar</button>
      <div style="position:relative;display:inline-block;">
        <img class="boneca-flutuante" src="imagens/outros/bonecacapa1.png" style="position:absolute;right:80%;top:-10%;height:140%;transform:rotate(-3deg);animation-duration:3.2s;">
        <img src="imagens/outros/capa.png" alt="Boneca" class="capa-boneca" onerror="this.style.display='none'">
        <img class="boneca-flutuante" src="imagens/outros/bonecacapa2.png" style="position:absolute;left:80%;top:-10%;height:140%;transform:rotate(3deg);animation-duration:4s;">
      </div>
    </div>
  </div>

  <div id="tela-jogo">
    <div class="jogo-header">
      <div class="jogo-titulo">Vista a Esther!</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="btn-resetar" onclick="resetarLook()">Limpar</button>
        <button id="btn-ver-album" onclick="irParaAlbum()">Album</button>
        <button id="btn-camera" onclick="tirarFoto()">
          <img src="imagens/outros/camera.png" style="width:60px;height:64px;object-fit:contain;">
        </button>
      </div>
    </div>
    <div class="jogo-body">
      <div class="barra-categorias">
        <div class="cat-btn" data-cat="meias" onclick="selecionarCategoria(this)">
          <img src="imagens/icones/icone_meias.png" alt="Meias" onerror="this.outerHTML='🧦'">
          <span class="cat-label">Meias</span>
        </div>
        <div class="cat-btn" data-cat="sapatos" onclick="selecionarCategoria(this)">
          <img src="imagens/icones/icone_sapatos.png" alt="Sapatos" onerror="this.outerHTML='👟'">
          <span class="cat-label">Sapatos</span>
        </div>
        <div class="cat-btn" data-cat="blusas" onclick="selecionarCategoria(this)">
          <img src="imagens/icones/icone_blusas.png" alt="Blusas" onerror="this.outerHTML='👕'">
          <span class="cat-label">Blusas</span>
        </div>
        <div class="cat-btn" data-cat="calcas" onclick="selecionarCategoria(this)">
          <img src="imagens/icones/icone_calcas.png" alt="Calcas" onerror="this.outerHTML='👖'">
          <span class="cat-label">Calcas</span>
        </div>
        <div class="cat-btn" data-cat="vestidos" onclick="selecionarCategoria(this)">
          <img src="imagens/icones/icone_vestidos.png" alt="Vestidos" onerror="this.outerHTML='👗'">
          <span class="cat-label">Vestidos</span>
        </div>
        <div class="cat-btn" data-cat="casacos" onclick="selecionarCategoria(this)">
          <img src="imagens/icones/icone_casacos.png" alt="Casacos" onerror="this.outerHTML='🧥'">
          <span class="cat-label">Casacos</span>
        </div>
        <div class="cat-btn" data-cat="acessorios" onclick="selecionarCategoria(this)">
          <img src="imagens/icones/icone_acessorios.png" alt="Acessorios" onerror="this.outerHTML='💍'">
          <span class="cat-label">Acess.</span>
        </div>
        <div class="cat-btn" data-cat="paredes" onclick="selecionarCategoria(this)">
          <img src="imagens/icones/icone_paredes.png" alt="Paredes" onerror="this.outerHTML='🖼️'">
          <span class="cat-label">Paredes</span>
        </div>
      </div>
      <div class="area-central">
        <div class="boneca-container">
          <img id="layer-paredes" src="" alt="" style="display:none;">
          <div class="boneca-wrapper" id="boneca-wrapper">
            <div id="moldura-camera"></div>
            <button id="btn-salvar-look" onclick="salvarLook()">Salvar look</button>
            <img id="corpo" src="imagens/outros/corpo.png" alt="Boneca">
            <img id="layer-meias"            src="" alt="" style="display:none;">
            <img id="layer-sapatos"          src="" alt="" style="display:none;">
            <img id="layer-calcas"           src="" alt="" style="display:none;">
            <img id="layer-blusas-baixo"     src="" alt="" style="display:none;">
            <img id="layer-acessorios-baixo" src="" alt="" style="display:none;">
            <img id="layer-blusas"           src="" alt="" style="display:none;">
            <img id="layer-vestidos"         src="" alt="" style="display:none;">
            <img id="layer-acessorios"       src="" alt="" style="display:none;">
            <img id="layer-casacos"          src="" alt="" style="display:none;">
          </div>
        </div>
        <div class="barra-opcoes" id="barra-opcoes">
          <div class="barra-vazia">Escolha uma categoria</div>
        </div>
      </div>
    </div>
  </div>

  <div id="tela-album">
    <div class="album-header">
      <div class="album-titulo">Meus Looks</div>
      <div class="album-contador" id="album-contador">0 / 12 looks</div>
    </div>
    <div class="album-grid" id="album-grid"></div>
    <div class="album-footer">
      <button id="btn-voltar-jogo" onclick="irParaJogo()">Voltar ao jogo</button>
      <button id="btn-voltar-capa" onclick="irParaCapa()">Pagina inicial</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
